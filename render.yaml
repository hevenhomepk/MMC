services:
  - type: web
    name: mmc-app
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node src/server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mmc-db
          property: connectionString

databases:
  - name: mmc-db
    plan: free
